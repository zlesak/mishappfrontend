server.port=${PORT:8081}
logging.level.org.atmosphere = warn
spring.mustache.check-template-location = false

vaadin.launch-browser=true
vaadin.frontend.hotdeploy=true
# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages = com.vaadin,org.vaadin,cz.uhk.zlesak.threejslearningapp,com.flowingcode
spring.jpa.defer-datasource-initialization = true
spring.sql.init.mode = never
spring.web.resources.static-locations=classpath:/static/,file:/app/webapp/

# Max file size (per file)
spring.servlet.multipart.max-file-size=50MB

# Max request size (total for all files + form data)
spring.servlet.multipart.max-request-size=50MB

# Keycloak OAuth2 Configuration
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:dev-client}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:secret}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_URL:http://mock-oidc:8080}/realms/${KEYCLOAK_REALM:mock-realm}
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# Proxy configuration - for nginx or other reverse proxies
server.forward-headers-strategy=framework
